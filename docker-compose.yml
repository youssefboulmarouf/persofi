name: persofi

services:
  mysql:
    image: mysql:8.0
    container_name: persofi-mysql
    environment:
      MYSQL_DATABASE: persofi
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - persofi_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    image: persofi-api:prod
    build:
      context: ./app
      dockerfile: Dockerfile.prod
    container_name: persofi-api
    environment:
      PORT: "5000"
      DATABASE_URL: "mysql://root:@mysql:3306/persofi"
      NODE_ENV: "production"
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5000:5000"

  web:
    image: persofi-web:prod
    build:
      context: ./client
      dockerfile: Dockerfile.prod
      args:
        REACT_APP_API_BASE_URL: "http://localhost:5000"
    container_name: persofi-web
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  persofi_mysql_data: