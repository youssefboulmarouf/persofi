name: persofi-dev

services:
  mysql:
    image: mysql:8.0
    container_name: persofi-dev-mysql
    environment:
      MYSQL_DATABASE: persofi
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - persofi_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    image: persofi-api:dev
    build:
      context: ./app
      dockerfile: Dockerfile.dev
    container_name: persofi-dev-api
    environment:
      PORT: "5000"
      DATABASE_URL: "mysql://root:@mysql:3306/persofi"
      NODE_ENV: "dev"
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - ./app:/app
      - /app/node_modules

  web:
    image: persofi-web:dev
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: persofi-dev-web
    environment:
      REACT_APP_API_BASE_URL: "http://localhost:5000"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ./client:/client
      - /client/node_modules
    stdin_open: true
    tty: true

volumes:
  persofi_mysql_data: